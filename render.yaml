services:
  - type: web
    name: anychars-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MINI_APP_URL
        value: https://miniapp-seven-omega.vercel.app
      - key: DATABASE_URL
        value: sqlite:///anychars.db